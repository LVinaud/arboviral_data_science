# Esquema canônico do dataset município–mês.
# Este arquivo é o contrato entre as ingestões e o pipeline de modelagem.
# Toda variável precisa ter: nome canônico em snake_case, tipo, fonte e periodicidade.

chaves:
  cod_ibge:
    tipo: int
    descricao: Código IBGE do município (7 dígitos)
  ano:
    tipo: int
  mes:
    tipo: int
    range: [1, 12]

geolocalizacao:
  periodicidade: estatica
  fonte: ibge_municipios + lookup/municipios_sp_estacoes_inmet.xlsx
  variaveis:
    nome_municipio: {tipo: str}
    cod_regiao_saude: {tipo: int}
    nome_regiao_saude: {tipo: str}
    lat: {tipo: float, descricao: "latitude do centróide do município (graus decimais)"}
    lon: {tipo: float, descricao: "longitude do centróide do município (graus decimais)"}
    estacao_inmet: {tipo: str, descricao: "código da estação automática INMET mais próxima (ex.: A711)"}
    dist_estacao_km: {tipo: float, descricao: "distância em km entre o município e a estação INMET associada"}

porte:
  fonte: ibge
  periodicidade: anual
  observacao: |
    IBGE só publica estimativas populacionais até 2023. Para 2024 e 2025,
    aplicamos forward-fill da estimativa de 2023 (ver build_master.py).
    Decisão metodológica: simplicidade e conservadorismo — variação populacional
    municipal anual é tipicamente <2%, dentro da margem de erro da própria
    estimativa do IBGE.
  variaveis:
    populacao_estimada: {tipo: int}

geografia_municipal:
  fonte: ibge_geoftp
  periodicidade: estatica
  observacao: |
    Área territorial obtida do FTP do IBGE (geoftp.ibge.gov.br),
    aba AR_BR_MUN do arquivo AR_BR_RG_UF_RGINT_RGI_MUN_2024.xls.
    Densidade calculada como pop_2023 / area_km2 (último ano oficial IBGE).
    Coleta automatizada em src/arboviral/scraping/ibge_areas.py.
  variaveis:
    area_km2: {tipo: float, descricao: "área territorial em km² (IBGE 2024)"}
    densidade_2023: {tipo: float, descricao: "habitantes / km² (último ano IBGE)"}

arboviroses:
  fonte: sinan_datasus
  periodicidade: mensal
  observacao: |
    Município de RESIDÊNCIA para dengue, zika e chikungunya (SINAN FTP).
    Para febre amarela, município de Local Provável de Infecção (LPI), fonte
    MS Dados Abertos (não está no FTP SINAN). Cada doença tem seu próprio prefixo
    de coluna: dengue_*, zika_*, chikungunya_*, febre_amarela_*.
  variaveis_por_doenca:
    "{doenca}_casos": {tipo: int, descricao: "casos notificados no município/mês"}
    "{doenca}_casos_provaveis": {tipo: int, descricao: "casos com classificação provável (apenas SINAN)"}
    "{doenca}_obitos": {tipo: int}
    "{doenca}_internacoes": {tipo: int, descricao: "apenas SINAN (HOSPITALIZ); não disponível para febre amarela"}
  features_derivadas_em_features:
    coef_incidencia: {tipo: float, descricao: "casos por 100 mil hab — calculado a partir de casos / populacao_estimada"}
    taxa_letalidade_pct: {tipo: float}
    taxa_internacao_pct: {tipo: float, descricao: "apenas SINAN"}

saude:
  fonte: datasus
  periodicidade: mensal
  variaveis:
    leitos_publicos: {tipo: int, descricao: "leitos hospitalares na rede pública municipal"}
    medicos_publicos: {tipo: int}
    mortalidade_materna: {tipo: float}

gestao_vigilancia:
  fonte: ibge_munic_2018
  periodicidade: estatica
  variaveis:
    msau28_pacs: {tipo: bool, descricao: "Programa de Agentes Comunitários de Saúde — existência"}
    msau541_vig_sanitaria: {tipo: bool}
    msau542_vig_epidemiologica: {tipo: bool}
    msau543_controle_endemias: {tipo: bool}

desastres_naturais:
  fonte: ibge_munic_2020_2017
  periodicidade: estatica
  variaveis:
    mgrd01_seca: {tipo: bool, descricao: "atingido por seca nos últimos 4 anos"}
    mgrd06_alagamento: {tipo: bool}
    mgrd07_erosao: {tipo: bool}
    mgrd08_enchente_gradual: {tipo: bool}
    mgrd11_enxurrada: {tipo: bool}
    mgrd14_deslizamento: {tipo: bool}
    mgrd201_mapeamento_risco: {tipo: bool, descricao: "existência de mapeamentos de áreas de risco de enchentes/inundações"}

meteorologia:
  fonte: inmet
  periodicidade: mensal
  observacao: associar município à estação automática INMET mais próxima por coordenadas; lag de 30 dias considerado na modelagem.
  variaveis:
    precip_min: {tipo: float}
    precip_media: {tipo: float}
    precip_max: {tipo: float}
    temp_min: {tipo: float}
    temp_media: {tipo: float}
    temp_max: {tipo: float}
    umid_min: {tipo: float}
    umid_media: {tipo: float}
    umid_max: {tipo: float}
    pressao_media: {tipo: float}
    vento_media: {tipo: float}

socioeconomico:
  periodicidade: anual
  variaveis:
    pib_per_capita: {tipo: float, fonte: ibge}
    idhm: {tipo: float, fonte: atlas_idh}
    capag: {tipo: categoria, valores: [A, B, C, "n.d."], fonte: stn_capag}
    gini: {tipo: float, fonte: datasus}

agua_esgoto:
  fonte: snis_sinisa
  periodicidade: anual
  observacao: "2023 e 2024 disponíveis no SINISA (arquivo local em data/raw/sinisa/). 2025 ainda não publicado."
  variaveis:
    iag0001_atend_agua_pct: {tipo: float, descricao: "atendimento da população total com rede de abastecimento de água (%)"}
    ies0001_atend_esgoto_pct: {tipo: float, descricao: "atendimento da população total com rede coletora de esgoto (%)"}
    ies2004_esgoto_tratado_pct: {tipo: float, descricao: "esgoto tratado referido ao esgoto coletado (%)"}

habitacao:
  fonte: ibge_aglomerados_subnormais
  periodicidade: anual
  variaveis:
    pop_favelas: {tipo: int}
    num_favelas: {tipo: int}
    mmam2612_moradia_risco: {tipo: bool, descricao: "existência de moradia em situação de risco ambiental"}

urbanizacao:
  fonte: sinisa_2024
  periodicidade: anual
  variaveis:
    iap0001_vias_pavimentadas_pct: {tipo: float, descricao: "parcela de vias públicas pavimentadas — área urbana (%)"}
